spring:
  application:
    name: re-content-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/recontent}
    username: ${DB_USERNAME:recontent}
    password: ${DB_PASSWORD:recontent}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    mapper:
      accept-case-insensitive-enums: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: re-content-backend
    description: Backend for the Re Content React TMDb platform
    version: 0.0.1-SNAPSHOT

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      issuer: ${JWT_ISSUER:re-content-backend}
      secret: ${JWT_SECRET:dev-only-change-this-secret-please-use-at-least-32-bytes}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-cookie:
      name: refresh_token
      secure: ${REFRESH_COOKIE_SECURE:false}
      same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
      path: /api/v1/auth
      ttl-days: ${REFRESH_TOKEN_TTL_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} thread=%thread logger=%logger{36} msg=%msg%n"
