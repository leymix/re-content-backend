name: re-content-stack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recontent}
      POSTGRES_USER: ${POSTGRES_USER:-recontent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recontent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recontent} -d ${POSTGRES_DB:-recontent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/recontent}
      DB_USERNAME: ${DB_USERNAME:-recontent}
      DB_PASSWORD: ${DB_PASSWORD:-recontent}
      JWT_ISSUER: ${JWT_ISSUER:-re-content-backend}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret-at-least-32-bytes}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-false}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-Lax}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost,http://127.0.0.1}
    ports:
      - "${BACKEND_PUBLIC_PORT:-8080}:8080"
    expose:
      - "8080"
    networks:
      - app

  frontend:
    build:
      context: ../../re-content
      dockerfile: Dockerfile
      args:
        REACT_APP_TMDB_API_KEY: ${REACT_APP_TMDB_API_KEY}
        REACT_APP_TMDB_BASE_URL: ${REACT_APP_TMDB_BASE_URL:-https://api.themoviedb.org/3}
        REACT_APP_BACKEND_BASE_URL: ${REACT_APP_BACKEND_BASE_URL:-/api/v1}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${FRONTEND_PUBLIC_PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

volumes:
  postgres-data:

networks:
  app:
    driver: bridge
